<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{PAGE_TITLE}}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f0e8;
        --panel: rgba(255, 252, 247, 0.92);
        --panel-strong: #fffaf2;
        --ink: #1c1812;
        --muted: #6c6051;
        --line: rgba(48, 35, 21, 0.14);
        --accent: #1f6f78;
        --accent-soft: rgba(31, 111, 120, 0.12);
        --shadow: 0 24px 80px rgba(61, 46, 31, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(196, 167, 125, 0.28), transparent 34%),
          radial-gradient(circle at right center, rgba(31, 111, 120, 0.16), transparent 28%),
          linear-gradient(180deg, #f7f2ea 0%, var(--bg) 100%);
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 40px auto 64px;
      }

      .shell {
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(255, 251, 245, 0.96), rgba(248, 241, 231, 0.9));
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      header {
        padding: 8px 4px 28px;
        border-bottom: 1px solid var(--line);
      }

      .header-row,
      .section-heading {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: space-between;
      }

      .export-actions {
        flex: 0 0 auto;
      }

      .export-button {
        appearance: none;
        border: 1px solid rgba(31, 111, 120, 0.28);
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.68);
        color: #153e44;
        cursor: pointer;
        font: 700 12px/1.1 "Helvetica Neue", Arial, sans-serif;
      }

      .export-button:hover {
        background: rgba(31, 111, 120, 0.1);
      }

      .eyebrow {
        display: inline-block;
        margin: 0 0 14px;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font: 600 12px/1.1 "Helvetica Neue", Arial, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 5vw, 4.4rem);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      .summary {
        max-width: 760px;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.72;
      }

      .pairs {
        display: grid;
        gap: 28px;
        margin-top: 28px;
      }

      .pair {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: linear-gradient(180deg, var(--panel) 0%, var(--panel-strong) 100%);
      }

      .text-pane {
        padding: 24px;
      }

      .section-label {
        margin: 0 0 10px;
        color: var(--accent);
        font: 600 12px/1.1 "Helvetica Neue", Arial, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h2 {
        margin: 0;
        font-size: clamp(1.6rem, 3vw, 2.35rem);
        line-height: 1.05;
        letter-spacing: -0.03em;
      }

      .body {
        display: grid;
        gap: 12px;
        margin-top: 16px;
        color: #2e261d;
        font-size: 1.02rem;
        line-height: 1.78;
      }

      .body p {
        margin: 0;
      }

      .body code {
        padding: 0.16em 0.42em;
        border: 1px solid rgba(31, 111, 120, 0.18);
        border-radius: 0.45rem;
        background: rgba(31, 111, 120, 0.08);
        color: #153e44;
        font: 0.92em/1.35 "SFMono-Regular", Menlo, Consolas, monospace;
      }

      .body ul {
        margin: 0;
        padding-left: 22px;
      }

      .body li + li {
        margin-top: 8px;
      }

      .content-block {
        margin-top: 16px;
      }

      .content-block:first-child {
        margin-top: 0;
      }

      .content-block--list ul,
      .content-block--files ul {
        margin: 0;
      }

      .content-block--callout {
        padding: 16px;
        border: 1px solid rgba(31, 111, 120, 0.2);
        border-radius: 14px;
        background: rgba(31, 111, 120, 0.08);
      }

      .content-block--callout h3 {
        margin: 0 0 8px;
        color: #153e44;
        font: 700 1rem/1.3 "Helvetica Neue", Arial, sans-serif;
      }

      .content-block--files li {
        padding: 4px 0;
      }

      .file-item {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .file-item code {
        align-self: flex-start;
      }

      .file-note {
        font-size: 0.95rem;
        color: #4d6070;
        line-height: 1.5;
      }

      .content-block--diagram {
        min-width: 0;
        border-radius: 18px;
        padding: 20px;
        background:
          linear-gradient(180deg, rgba(252, 248, 241, 0.96), rgba(244, 235, 223, 0.82)),
          repeating-linear-gradient(
            135deg,
            rgba(31, 111, 120, 0.05),
            rgba(31, 111, 120, 0.05) 10px,
            transparent 10px,
            transparent 20px
        );
      }

      .diagram-frame {
        width: 100%;
        min-width: 0;
        min-height: 240px;
        height: 380px;
        border: 1px solid rgba(31, 111, 120, 0.18);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        position: relative;
        overflow: hidden;
      }

      .diagram-frame:fullscreen {
        width: 100vw !important;
        height: 100vh !important;
        border: none;
        border-radius: 0;
        background: #fffaf2;
      }

      .diagram-frame:-webkit-full-screen {
        width: 100vw !important;
        height: 100vh !important;
        border: none;
        border-radius: 0;
        background: #fffaf2;
      }

      .diagram-frame:-moz-full-screen {
        width: 100vw !important;
        height: 100vh !important;
        border: none;
        border-radius: 0;
        background: #fffaf2;
      }

      .diagram-frame:-ms-fullscreen {
        width: 100vw !important;
        height: 100vh !important;
        border: none;
        border-radius: 0;
        background: #fffaf2;
      }

      .diagram-toolbar {
        position: absolute;
        bottom: 12px;
        right: 12px;
        display: flex;
        gap: 6px;
        z-index: 10;
      }

      .toolbar-button {
        appearance: none;
        width: 30px;
        height: 30px;
        border: 1px solid rgba(31, 111, 120, 0.22);
        border-radius: 8px;
        background: rgba(255, 252, 247, 0.88);
        color: #1f6f78;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font: 700 13px sans-serif;
        box-shadow: 0 2px 8px rgba(31, 111, 120, 0.08);
        backdrop-filter: blur(4px);
        transition: all 0.15s ease;
      }

      .toolbar-button:hover {
        background: #fffaf2;
        border-color: #1f6f78;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(31, 111, 120, 0.14);
      }

      .toolbar-button:active {
        transform: translateY(0);
      }

      footer {
        margin-top: 18px;
        color: var(--muted);
        font: 500 0.92rem/1.6 "Helvetica Neue", Arial, sans-serif;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 1120px);
          margin: 20px auto 28px;
        }

        .shell {
          padding: 18px;
          border-radius: 22px;
        }

        .text-pane,
        .content-block--diagram {
          padding: 16px;
        }

        .header-row,
        .section-heading {
          display: grid;
        }

        .export-actions {
          margin-top: 14px;
        }

        .content-block--files li {
          grid-template-columns: 1fr;
          gap: 4px;
        }

        .diagram-frame {
          min-height: 180px;
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell" data-export-page-target>
        <header>
          <div class="header-row">
            <div>
              <p class="eyebrow">Visual Explainer</p>
              <h1>{{TITLE}}</h1>
              {{SUMMARY}}
            </div>
            <div class="export-actions" data-export-control>
              <button class="export-button" type="button" data-export-page>Save page PNG</button>
            </div>
          </div>
        </header>

        <section class="pairs">
          {{PAIRS}}
        </section>

        <footer>
          Diagrams are rendered in-browser using Cytoscape.js and the Dagre layout extension.
        </footer>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dagre@0.7.4/dist/dagre.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
    <script>
      const { toPng } = htmlToImage;

      function getFullscreenElement() {
        return document.fullscreenElement || 
               document.webkitFullscreenElement || 
               document.mozFullScreenElement || 
               document.msFullscreenElement;
      }

      function requestFullscreen(element) {
        if (element.requestFullscreen) {
          element.requestFullscreen();
        } else if (element.webkitRequestFullscreen) {
          element.webkitRequestFullscreen();
        } else if (element.mozRequestFullScreen) {
          element.mozRequestFullScreen();
        } else if (element.msRequestFullscreen) {
          element.msRequestFullscreen();
        }
      }

      function exitFullscreen() {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }

      function parseMermaid(source) {
        const lines = source.split('\n');
        const elements = [];
        const nodesMap = new Map();
        let currentParentId = null;
        let direction = 'TB';

        function registerNode(rawId, bracketOpen, label, bracketClose) {
          const id = rawId.trim();
          if (!id) return null;

          let shape = 'round-rectangle';
          if (bracketOpen) {
            if (bracketOpen.includes('{')) shape = 'diamond';
            else if (bracketOpen.includes('(') && bracketOpen.includes('[')) shape = 'round-rectangle';
            else if (bracketOpen.includes('[') && bracketOpen.includes('(')) shape = 'barrel';
            else if (bracketOpen.includes('(')) shape = bracketOpen.length > 1 ? 'ellipse' : 'round-rectangle';
            else if (bracketOpen.includes('[')) shape = 'rectangle';
          }

          let finalLabel = label ? label.trim() : id;
          finalLabel = finalLabel.replace(/<br\s*\/?>/gi, '\n');

          // If it was originally a cylinder shape and label was quoted or sanitized
          if (finalLabel.startsWith('(') && finalLabel.endsWith(')') && shape === 'rectangle') {
            finalLabel = finalLabel.slice(1, -1).trim();
            shape = 'barrel';
          }

          if (!nodesMap.has(id)) {
            const nodeObj = {
              data: {
                id,
                label: finalLabel,
                shape,
                parent: currentParentId || undefined
              }
            };
            nodesMap.set(id, nodeObj);
            elements.push(nodeObj);
          } else {
            const existing = nodesMap.get(id);
            if (label) {
              existing.data.label = finalLabel;
              existing.data.shape = shape;
            }
            if (currentParentId && !existing.data.parent) {
              existing.data.parent = currentParentId;
            }
          }
          return id;
        }

        function parseNodeToken(token) {
          const nodeMatch = token.match(/^([a-zA-Z0-9_-]+)(?:\s*([([{>{]+)(?:"([^"]+)"|'([^']+)'|([^)\]>}]+))([)\]>}]+))?$/);
          if (!nodeMatch) {
            const id = token.trim();
            registerNode(id);
            return id;
          }
          const [_, id, bracketOpen, labelQ, labelS, labelU] = nodeMatch;
          const label = labelQ || labelS || labelU;
          registerNode(id, bracketOpen, label);
          return id;
        }

        for (let line of lines) {
          line = line.trim();
          if (!line || line.startsWith('%%')) continue;

          const headerMatch = line.match(/^(flowchart|graph)\s+(TD|TB|LR|RL|BT)/i);
          if (headerMatch) {
            direction = headerMatch[2].toUpperCase();
            if (direction === 'TD') direction = 'TB';
            continue;
          }

          const subgraphStartMatch = line.match(/^subgraph\s+([a-zA-Z0-9_-]+)(?:\s*(?:\[|"|\[")([^"\]]+)(?:"\]|\]|")?)?/i);
          if (subgraphStartMatch) {
            const subId = subgraphStartMatch[1];
            const subLabel = subgraphStartMatch[2] || subId;
            const subNode = {
              data: {
                id: subId,
                label: subLabel,
                shape: 'rectangle',
                parent: currentParentId || undefined
              }
            };
            nodesMap.set(subId, subNode);
            elements.push(subNode);
            currentParentId = subId;
            continue;
          }

          if (line.toLowerCase() === 'end') {
            currentParentId = null;
            continue;
          }

          const connectorMatch = line.match(/(--+>|---+|-\.-+>|==+>)(?:\|([^|]+)\|)?/);
          if (connectorMatch) {
            const connector = connectorMatch[1];
            const edgeLabel = connectorMatch[2];
            const splitIdx = line.indexOf(connectorMatch[0]);
            const leftPart = line.substring(0, splitIdx).trim();
            const rightPart = line.substring(splitIdx + connectorMatch[0].length).trim();

            const sourceId = parseNodeToken(leftPart);
            const targetId = parseNodeToken(rightPart);

            let lineStyle = 'solid';
            let width = 1.5;
            if (connector.includes('.')) lineStyle = 'dashed';
            if (connector.includes('=')) width = 3;

            elements.push({
              data: {
                id: `${sourceId}-${targetId}-${elements.length}`,
                source: sourceId,
                target: targetId,
                label: edgeLabel ? edgeLabel.trim() : undefined,
                lineStyle,
                width
              }
            });
          } else {
            parseNodeToken(line);
          }
        }

        return { elements, direction };
      }

      document.querySelectorAll("[data-mermaid-source]").forEach((host, index) => {
        const source = host.dataset.mermaidSource;
        try {
          const { elements, direction } = parseMermaid(source);

          cytoscape({
            container: host,
            elements: elements,
            boxSelectionEnabled: false,
            autoungrabify: false,
            style: [
              {
                selector: 'node',
                style: {
                  'background-color': '#fffaf2',
                  'label': 'data(label)',
                  'shape': 'data(shape)',
                  'padding': '14px',
                  'border-width': 1.5,
                  'border-color': '#1f6f78',
                  'color': '#1c1812',
                  'font-family': 'Georgia, Times New Roman, serif',
                  'font-size': '13px',
                  'text-valign': 'center',
                  'text-halign': 'center',
                  'text-wrap': 'wrap',
                  'text-max-width': '220px'
                }
              },
              {
                selector: 'node:childless',
                style: {
                  'width': (node) => {
                    const label = node.data('label') || '';
                    const longestLine = label.split('\n').reduce((max, line) => Math.max(max, line.length), 0);
                    return Math.max(80, longestLine * 7.5 + 28);
                  },
                  'height': (node) => {
                    const label = node.data('label') || '';
                    const lineCount = label.split('\n').length;
                    return Math.max(40, lineCount * 16 + 20);
                  }
                }
              },
              {
                selector: 'node:active',
                style: {
                  'border-color': '#153e44',
                  'border-width': 2.5
                }
              },
              {
                selector: 'node:parent',
                style: {
                  'background-color': 'rgba(31, 111, 120, 0.04)',
                  'border-style': 'dashed',
                  'border-color': 'rgba(31, 111, 120, 0.3)',
                  'text-valign': 'top',
                  'text-halign': 'center',
                  'padding': '18px',
                  'font-weight': 'bold',
                  'color': '#1f6f78'
                }
              },
              {
                selector: 'edge',
                style: {
                  'width': 'data(width)',
                  'line-color': '#4d6070',
                  'line-style': 'data(lineStyle)',
                  'target-arrow-color': '#4d6070',
                  'target-arrow-shape': 'triangle',
                  'arrow-scale': 1.15,
                  'curve-style': 'bezier',
                  'control-point-step-size': 60,
                  'label': 'data(label)',
                  'font-family': 'Helvetica Neue, Arial, sans-serif',
                  'font-size': '11px',
                  'color': '#6c6051',
                  'text-background-opacity': 0.85,
                  'text-background-color': '#fffaf2',
                  'text-background-padding': '4px',
                  'text-background-shape': 'roundrectangle'
                }
              }
            ],
            layout: {
              name: 'dagre',
              rankDir: direction,
              nodeSep: 100,
              edgeSep: 40,
              rankSep: 100,
              fit: true,
              padding: 20
            }
          });

          const toolbar = host.querySelector('.diagram-toolbar');
          if (toolbar) {
            const fullscreenBtn = toolbar.querySelector('[data-fullscreen]');
            if (fullscreenBtn) {
              fullscreenBtn.addEventListener('click', () => {
                if (getFullscreenElement() === host) {
                  exitFullscreen();
                } else {
                  requestFullscreen(host);
                }
              });
            }
          }

          const handleFullscreenChange = () => {
            const isFullscreen = getFullscreenElement() === host;
            const btn = host.querySelector('[data-fullscreen]');
            if (btn) {
              btn.textContent = isFullscreen ? '✕' : '⛶';
              btn.title = isFullscreen ? 'Exit Fullscreen' : 'Toggle Fullscreen';
            }
          };

          host.addEventListener('fullscreenchange', handleFullscreenChange);
          host.addEventListener('webkitfullscreenchange', handleFullscreenChange);
          host.addEventListener('mozfullscreenchange', handleFullscreenChange);
          host.addEventListener('MSFullscreenChange', handleFullscreenChange);

          const resizeObserver = new ResizeObserver(() => {
            cy.resize();
            cy.fit(20);
          });
          resizeObserver.observe(host);
        } catch (error) {
          console.error("Failed to render Cytoscape diagram", error);
          host.innerHTML = `<pre style="padding: 20px; color: red;">Failed to render diagram: ${error.message}</pre>`;
        }
      });

      const slugify = (value) =>
        String(value || "visual-explainer")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 80) || "visual-explainer";

      const downloadPng = (dataUrl, filename) => {
        const link = document.createElement("a");
        link.download = filename;
        link.href = dataUrl;
        link.click();
      };

      const exportFilter = (node) => !node.closest?.("[data-export-control]");
      const MAX_EXPORT_PIXEL_RATIO = 4;
      const MAX_EXPORT_CANVAS_SIDE = 16384;
      const MAX_EXPORT_CANVAS_AREA = 268435456;

      const getExportPixelRatio = (node) => {
        const width = Math.max(1, node.scrollWidth || node.getBoundingClientRect().width);
        const height = Math.max(1, node.scrollHeight || node.getBoundingClientRect().height);
        const sideRatio = Math.min(MAX_EXPORT_CANVAS_SIDE / width, MAX_EXPORT_CANVAS_SIDE / height);
        const areaRatio = Math.sqrt(MAX_EXPORT_CANVAS_AREA / (width * height));

        return Math.max(1, Math.min(MAX_EXPORT_PIXEL_RATIO, sideRatio, areaRatio));
      };

      const exportNode = async (node, filename) => {
        const dataUrl = await toPng(node, {
          cacheBust: true,
          pixelRatio: getExportPixelRatio(node),
          backgroundColor: "#f5f0e8",
          filter: exportFilter,
        });
        downloadPng(dataUrl, filename);
      };

      const pageTitle = slugify(document.querySelector("h1")?.textContent);
      document.querySelector("[data-export-page]")?.addEventListener("click", (event) => {
        exportNode(document.querySelector("[data-export-page-target]"), `${pageTitle}.png`);
      });

      document.querySelectorAll("[data-export-section-button]").forEach((button, index) => {
        button.addEventListener("click", (event) => {
          const section = event.currentTarget.closest("[data-export-section]");
          const sectionTitle = slugify(section?.dataset.exportTitle || `section-${index + 1}`);
          exportNode(section, `${pageTitle}-${sectionTitle}.png`);
        });
      });
    </script>
  </body>
</html>
